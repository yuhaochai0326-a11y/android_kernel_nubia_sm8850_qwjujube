name: Compile RedMagic 11 Pro Kernel (NX809J)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libelf-dev libssl-dev rsync python3 python3-pip git wget libdw-dev zip dwarves gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Download Clang Compiler (r547379)
        run: |
          echo "Downloading Android Clang r547379..."
          git clone -b llvm-r547379-release --depth 1 --sparse --filter=blob:none https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-bin
          cd clang-bin
          git sparse-checkout set clang-r547379
          mv clang-r547379 ..
          cd ..
          rm -rf clang-bin

      - name: Compile Kernel
        run: |
          export RUSTC=missing
          chmod +x super_build.sh
          ./super_build.sh

      - name: Compile Touchscreen Driver Module
        run: |
          export CLANG_DIR="$(pwd)/clang-r547379"
          export PATH="$CLANG_DIR/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang
          export RUSTC=missing
          make -C kernel_platform/common M=drivers/soc/qcom/zte/zte_tpd LLVM=1 LLVM_IAS=1 KBUILD_MODPOST_WARN=1 modules
          cp kernel_platform/common/drivers/soc/qcom/zte/zte_tpd/zte_tpd.ko vendor/zte/zte_tpd/zte_tpd.ko

      - name: Patch Touchscreen Driver (zte_tpd.ko)
        run: |
          if [ -f vendor/zte/zte_tpd/zte_tpd.ko ]; then
            echo "Patching touchscreen driver..."
            python3 vendor/zte/zte_tpd/patch_tpd.py stock_rom_modules/modules/zte_tpd.ko vendor/zte/zte_tpd/zte_tpd.ko
          else
            echo "❌ Error: zte_tpd.ko not found after build!"
            exit 1
          fi

      - name: Repack and Sign Boot Image
        run: |
          chmod +x repack_perfect_sign.sh
          ./repack_perfect_sign.sh

      - name: Upload Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: dev_reverse_perfect
          path: dev_reverse_perfect.img

      - name: Upload Patched Touchscreen Module
        uses: actions/upload-artifact@v4
        with:
          name: zte_tpd_patched
          path: vendor/zte/zte_tpd/zte_tpd.ko

      - name: Upload Magisk Module Zip
        uses: actions/upload-artifact@v4
        with:
          name: zte_custom_drivers_zip
          path: zte_custom_drivers.zip

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="build-run-${{ github.run_number }}-$(date +'%Y%m%d%H%M')"
          echo "🚀 Creating GitHub Release: $TAG_NAME"
          gh release create "$TAG_NAME" \
            dev_reverse_perfect.img \
            vendor/zte/zte_tpd/zte_tpd.ko \
            zte_custom_drivers.zip \
            --title "Build Run #${{ github.run_number }} (NX809J)" \
            --notes "Automated build compiled on $(date). Contains signed kernel image, patched touchscreen module, and Magisk/KernelSU flashable module."

